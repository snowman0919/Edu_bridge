name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 예시 1: 이미 정적 파일이 저장소에 있는 경우
      # 예: root에 index.html이 있거나 public/ 폴더를 그대로 배포하는 경우
      # 아래 "Prepare static files"만 사용하면 됨

      # 예시 2: Node 기반 정적 사이트인 경우
      # package.json이 있고 npm run build 결과가 dist/에 생성된다고 가정
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # dist/를 Pages 업로드용 디렉터리로 준비
      - name: Prepare static files
        run: |
          test -d dist
          mkdir -p ./_site
          cp -r dist/* ./_site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
